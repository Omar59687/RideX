<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 128" role="img" aria-labelledby="title desc">
  <title id="title">RideX wordmark</title>
  <desc id="desc">RideX route mark and custom wordmark lockup.</desc>
  <defs>
    <linearGradient id="brand" x1="16" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#625BF6"/>
      <stop offset="1" stop-color="#8B6DFF"/>
    </linearGradient>
  </defs>
  <g transform="translate(4 4) scale(.92)">
    <path d="M35 17c-8 28-7 62 2 94" fill="none" stroke="url(#brand)" stroke-width="18" stroke-linecap="round"/>
    <path d="M75 18c-8 28-7 58 1 88" fill="none" stroke="#35C2C8" stroke-width="18" stroke-linecap="round"/>
    <path d="M20 50c25 3 55 24 88 62" fill="none" stroke="url(#brand)" stroke-width="17" stroke-linecap="round"/>
    <circle cx="31" cy="18" r="10" fill="#FFFFFF" stroke="#FF7868" stroke-width="6"/>
    <circle cx="106" cy="110" r="10" fill="#FFFFFF" stroke="#625BF6" stroke-width="6"/>
  </g>
  <text x="132" y="88" fill="#242233" font-family="Plus Jakarta Sans, Avenir Next, Segoe UI, sans-serif" font-size="70" font-weight="800" letter-spacing="-4">Ride</text>
  <text x="302" y="88" fill="#625BF6" font-family="Plus Jakarta Sans, Avenir Next, Segoe UI, sans-serif" font-size="70" font-weight="800" letter-spacing="-4">X</text>
</svg>
